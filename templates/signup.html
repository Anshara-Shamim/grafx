{% extends 'base.html' %}
{% block title %}Sign Up GRAΦX{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>GRA<span class="accent">Φ</span>X</h2>
      <p>Create your free account.</p>
    </div>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="POST" class="auth-form">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="your name" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@university.edu" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary full">Create Account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
